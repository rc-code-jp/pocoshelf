name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          pkg="minishelf-${version}-${{ matrix.archive_suffix }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/minishelf" minishelf
          chmod +x minishelf
          tar -czf "dist/${pkg}.tar.gz" minishelf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minishelf-${{ matrix.archive_suffix }}
          path: dist/*.tar.gz

  release:
    name: create release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  update_formula:
    name: update homebrew formula
    runs-on: ubuntu-24.04
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Update Formula/minishelf.rb
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mac_sha="$(awk '/minishelf-'"$version"'-macos-aarch64.tar.gz/{print $1}' dist/checksums.txt)"
          linux_sha="$(awk '/minishelf-'"$version"'-linux-x86_64.tar.gz/{print $1}' dist/checksums.txt)"

          if [[ -z "$mac_sha" || -z "$linux_sha" ]]; then
            echo "Missing checksum(s) for version $version" >&2
            exit 1
          fi

          python3 - "$version" "$mac_sha" "$linux_sha" <<'PY'
          from pathlib import Path
          import re
          import sys

          version = sys.argv[1]
          mac_sha = sys.argv[2]
          linux_sha = sys.argv[3]
          formula = Path("Formula/minishelf.rb")
          text = formula.read_text()

          text, n1 = re.subn(
              r'(?m)^  version "[0-9]+\.[0-9]+\.[0-9]+"$',
              f'  version "{version}"',
              text,
              count=1,
          )
          if n1 != 1:
            raise SystemExit("Failed to update formula version")

          text, n2 = re.subn(
              r'(on_macos do\s+url "[^"]+"\s+sha256 )"[a-f0-9]{64}"',
              r'\1"' + mac_sha + '"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if n2 != 1:
            raise SystemExit("Failed to update macOS checksum")

          text, n3 = re.subn(
              r'(on_linux do\s+url "[^"]+"\s+sha256 )"[a-f0-9]{64}"',
              r'\1"' + linux_sha + '"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if n3 != 1:
            raise SystemExit("Failed to update Linux checksum")

          formula.write_text(text)
          PY

      - name: Commit and push Formula update
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/minishelf.rb; then
            echo "Formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/minishelf.rb
          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
