name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve_ref:
    name: resolve release tag
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag: '$tag' (expected vX.Y.Z or pre-release form like vX.Y.Z-rc.1)" >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build_macos:
    name: build macOS Apple Silicon
    runs-on: macos-14
    needs: resolve_ref
    permissions:
      contents: read
    env:
      TARGET: aarch64-apple-darwin
      ARCHIVE_NAME: pocoshelf-${{ needs.resolve_ref.outputs.version }}-aarch64-apple-darwin
      APPLE_CODESIGN_ENABLED: ${{ vars.APPLE_CODESIGN_ENABLED || 'false' }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ needs.resolve_ref.outputs.release_tag }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup target add "$TARGET" --toolchain stable

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target "$TARGET"
          cp "target/$TARGET/release/pocoshelf" pocoshelf
          chmod +x pocoshelf

      - name: Import Developer ID certificate
        if: env.APPLE_CODESIGN_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE_P12_BASE64:?Missing APPLE_CERTIFICATE_P12_BASE64}"
          : "${APPLE_CERTIFICATE_PASSWORD:?Missing APPLE_CERTIFICATE_PASSWORD}"
          : "${APPLE_SIGN_IDENTITY:?Missing APPLE_SIGN_IDENTITY}"
          security create-keychain -p "$RUNNER_TEMP/codesign" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP/codesign" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -d > "$RUNNER_TEMP/certificate.p12" 2>/dev/null || \
            printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$RUNNER_TEMP/codesign" \
            build.keychain

      - name: Codesign binary
        if: env.APPLE_CODESIGN_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          codesign --force --options runtime --sign "$APPLE_SIGN_IDENTITY" pocoshelf
          codesign --verify --verbose=2 pocoshelf

      - name: Notarize binary
        if: env.APPLE_CODESIGN_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER_ID:?Missing APPLE_API_ISSUER_ID}"
          : "${APPLE_API_PRIVATE_KEY_BASE64:?Missing APPLE_API_PRIVATE_KEY_BASE64}"
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/private_keys/AuthKey_$APPLE_API_KEY_ID.p8" 2>/dev/null || \
            printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/private_keys/AuthKey_$APPLE_API_KEY_ID.p8"
          ditto -c -k --keepParent pocoshelf "$RUNNER_TEMP/${ARCHIVE_NAME}.zip"
          xcrun notarytool submit "$RUNNER_TEMP/${ARCHIVE_NAME}.zip" \
            --key "$RUNNER_TEMP/private_keys/AuthKey_$APPLE_API_KEY_ID.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple pocoshelf
          spctl --assess --type execute --verbose pocoshelf

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf "dist/${ARCHIVE_NAME}.tar.gz" pocoshelf

      - name: Upload release artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: dist/${{ env.ARCHIVE_NAME }}.tar.gz

  release:
    name: publish release
    runs-on: ubuntu-24.04
    needs: [resolve_ref, build_macos]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve_ref.outputs.release_tag }}"
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.gz dist/checksums.txt --clobber --repo "$GH_REPO"
          else
            gh release create "$tag" dist/*.tar.gz dist/checksums.txt --verify-tag --repo "$GH_REPO"
          fi
