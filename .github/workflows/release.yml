name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve_ref:
    name: resolve release tag
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag: '$tag' (expected vX.Y.Z or pre-release form like vX.Y.Z-rc.1)" >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build_macos:
    name: build macOS Apple Silicon
    runs-on: macos-14
    needs: resolve_ref
    permissions:
      contents: read
    env:
      TARGET: aarch64-apple-darwin
      ARCHIVE_NAME: pocoshelf-${{ needs.resolve_ref.outputs.version }}-aarch64-apple-darwin
      APPLE_CODESIGN_ENABLED: ${{ vars.APPLE_CODESIGN_ENABLED || 'false' }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ needs.resolve_ref.outputs.release_tag }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup target add "$TARGET" --toolchain stable

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target "$TARGET"
          cp "target/$TARGET/release/pocoshelf" pocoshelf
          chmod +x pocoshelf

      - name: Import Developer ID certificate
        if: env.APPLE_CODESIGN_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE_P12_BASE64:?Missing APPLE_CERTIFICATE_P12_BASE64}"
          : "${APPLE_CERTIFICATE_PASSWORD:?Missing APPLE_CERTIFICATE_PASSWORD}"
          : "${APPLE_SIGN_IDENTITY:?Missing APPLE_SIGN_IDENTITY}"
          security create-keychain -p "$RUNNER_TEMP/codesign" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP/codesign" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -d > "$RUNNER_TEMP/certificate.p12" 2>/dev/null || \
            printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$RUNNER_TEMP/codesign" \
            build.keychain

      - name: Codesign binary
        if: env.APPLE_CODESIGN_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          codesign --force --options runtime --sign "$APPLE_SIGN_IDENTITY" pocoshelf
          codesign --verify --verbose=2 pocoshelf

      - name: Notarize binary
        if: env.APPLE_CODESIGN_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER_ID:?Missing APPLE_API_ISSUER_ID}"
          : "${APPLE_API_PRIVATE_KEY_BASE64:?Missing APPLE_API_PRIVATE_KEY_BASE64}"
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/private_keys/AuthKey_$APPLE_API_KEY_ID.p8" 2>/dev/null || \
            printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/private_keys/AuthKey_$APPLE_API_KEY_ID.p8"
          ditto -c -k --keepParent pocoshelf "$RUNNER_TEMP/${ARCHIVE_NAME}.zip"
          xcrun notarytool submit "$RUNNER_TEMP/${ARCHIVE_NAME}.zip" \
            --key "$RUNNER_TEMP/private_keys/AuthKey_$APPLE_API_KEY_ID.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple pocoshelf
          spctl --assess --type execute --verbose pocoshelf

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf "dist/${ARCHIVE_NAME}.tar.gz" pocoshelf

      - name: Upload release artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: dist/${{ env.ARCHIVE_NAME }}.tar.gz

  release:
    name: publish release
    runs-on: ubuntu-24.04
    needs: [resolve_ref, build_macos]
    outputs:
      version: ${{ steps.homebrew.outputs.version }}
      archive_url: ${{ steps.homebrew.outputs.archive_url }}
      archive_sha256: ${{ steps.homebrew.outputs.archive_sha256 }}
    permissions:
      contents: write
    env:
      APPLE_CODESIGN_ENABLED: ${{ vars.APPLE_CODESIGN_ENABLED || 'false' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve_ref.outputs.release_tag }}"
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.gz dist/checksums.txt --clobber --repo "$GH_REPO"
          else
            gh release create "$tag" dist/*.tar.gz dist/checksums.txt --verify-tag --repo "$GH_REPO"
          fi

      - name: Collect Homebrew tap update values
        id: homebrew
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.resolve_ref.outputs.version }}"
          archive="pocoshelf-${version}-aarch64-apple-darwin.tar.gz"
          sha256="$(awk -v file="$archive" '$2 == file { print $1 }' dist/checksums.txt)"
          url="https://github.com/${{ github.repository }}/releases/download/v${version}/${archive}"

          if [[ -z "$sha256" ]]; then
            echo "Missing checksum for $archive" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "archive_url=$url" >> "$GITHUB_OUTPUT"
          echo "archive_sha256=$sha256" >> "$GITHUB_OUTPUT"

          {
            echo "## Homebrew tap values"
            echo
            echo "- version: \\`${version}\\`"
            echo "- url: \\`${url}\\`"
            echo "- sha256: \\`${sha256}\\`"
            echo
            if [[ "${APPLE_CODESIGN_ENABLED}" == "true" ]]; then
              echo "Signed/notarized archive: yes"
            else
              echo "Signed/notarized archive: no"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  update_homebrew_tap:
    name: update Homebrew tap
    runs-on: ubuntu-24.04
    needs: [release]
    permissions:
      contents: read
    env:
      TAP_REPOSITORY: rc-code-jp/homebrew-tap
      FORMULA_PATH: Formula/pocoshelf.rb
    steps:
      - name: Generate GitHub App installation token
        id: app-token
        shell: bash
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          APP_OWNER: rc-code-jp
          APP_REPOSITORY: homebrew-tap
        run: |
          set -euo pipefail
          : "${APP_ID:?Missing APP_ID}"
          : "${APP_PRIVATE_KEY:?Missing APP_PRIVATE_KEY}"

          app_jwt="$(
            APP_ID="$APP_ID" APP_PRIVATE_KEY="$APP_PRIVATE_KEY" ruby <<'RUBY'
          require "base64"
          require "json"
          require "openssl"

          def base64url(data)
            Base64.urlsafe_encode64(data, padding: false)
          end

          now = Time.now.to_i
          header = { alg: "RS256", typ: "JWT" }
          payload = {
            iat: now - 60,
            exp: now + 540,
            iss: ENV.fetch("APP_ID"),
          }

          private_key = OpenSSL::PKey::RSA.new(ENV.fetch("APP_PRIVATE_KEY"))
          signing_input = [header, payload].map { |part| base64url(JSON.generate(part)) }.join(".")
          signature = private_key.sign(OpenSSL::Digest::SHA256.new, signing_input)
          puts [signing_input, base64url(signature)].join(".")
          RUBY
          )"

          installation_response="$(
            curl --fail-with-body --silent --show-error \
              --request GET \
              --url "https://api.github.com/repos/${APP_OWNER}/${APP_REPOSITORY}/installation" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${app_jwt}" \
              --header "X-GitHub-Api-Version: 2022-11-28"
          )"

          installation_id="$(
            INSTALLATION_RESPONSE="$installation_response" ruby <<'RUBY'
          require "json"
          puts JSON.parse(ENV.fetch("INSTALLATION_RESPONSE")).fetch("id")
          RUBY
          )"

          token_response="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --url "https://api.github.com/app/installations/${installation_id}/access_tokens" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${app_jwt}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --header "Content-Type: application/json" \
              --data '{"repositories":["homebrew-tap"]}'
          )"

          token="$(
            TOKEN_RESPONSE="$token_response" ruby <<'RUBY'
          require "json"
          puts JSON.parse(ENV.fetch("TOKEN_RESPONSE")).fetch("token")
          RUBY
          )"

          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
          ARCHIVE_URL: ${{ needs.release.outputs.archive_url }}
          ARCHIVE_SHA256: ${{ needs.release.outputs.archive_sha256 }}
        run: |
          set -euo pipefail
          formula="homebrew-tap/${FORMULA_PATH}"

          ruby -e '
            require "fileutils"

            path, version, sha256 = ARGV

            if File.exist?(path)
              text = File.read(path)
            else
              FileUtils.mkdir_p(File.dirname(path))
              text = <<~RUBY
                class Pocoshelf < Formula
                  desc "Rust TUI file explorer with git-aware coloring"
                  homepage "https://github.com/rc-code-jp/pocoshelf"
                  version "#{version}"

                  url "https://github.com/rc-code-jp/pocoshelf/releases/download/v\#{version}/pocoshelf-\#{version}-aarch64-apple-darwin.tar.gz"
                  sha256 "#{sha256}"

                  def install
                    bin.install "pocoshelf"
                  end

                  test do
                    system "\#{bin}/pocoshelf", "--version"
                  end
                end
              RUBY
            end

            text.sub!(/^(\s*version\s+").*(")$/,"\\1#{version}\\2") or abort("version line not found")
            text.sub!(/^(\s*sha256\s+").*(")$/,"\\1#{sha256}\\2") or abort("sha256 line not found")
            File.write(path, text)
          ' "$formula" "$VERSION" "$ARCHIVE_SHA256"

          {
            echo "## Homebrew tap update"
            echo
            echo "- repository: \`${TAP_REPOSITORY}\`"
            echo "- formula: \`${FORMULA_PATH}\`"
            echo "- version: \`${VERSION}\`"
            echo "- url: \`${ARCHIVE_URL}\`"
            echo "- sha256: \`${ARCHIVE_SHA256}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push formula update
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "pocoshelf release bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_PATH}"

          if git diff --cached --quiet; then
            echo "No tap changes to commit"
            exit 0
          fi

          git commit -m "pocoshelf ${VERSION}"
          git push origin HEAD:main
